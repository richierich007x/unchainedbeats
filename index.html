<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnchainedBeats</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --bg: #0a0a0a;
            --card: #111;
            --text: #e0e0e0;
            --accent: #ff2a4d;
        }
        
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        
        header {
            background: linear-gradient(135deg, #111, #1a1a1a);
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        
        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        nav a {
            color: #ccc;
            margin-left: 2rem;
            text-decoration: none;
            font-weight: 500;
        }
        
        .hero {
            text-align: center;
            padding: 8rem 5%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://picsum.photos/2000/1200?random=1');
            background-size: cover;
            color: white;
        }
        
        .hero h1 {
            font-size: 4rem;
            margin: 0;
        }
        
        .hero p {
            font-size: 1.4rem;
            max-width: 600px;
            margin: 1rem auto;
        }
        
        .section {
            padding: 5rem 5%;
        }
        
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }
        
        .card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }
        
        .card-content {
            padding: 1.5rem;
        }
        
        .play-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">UnchainedBeats</div>
        <nav>
            <a href="#">Browse</a>
            <a href="#">For Artists</a>
            <a href="#">Community</a>
        </nav>
    </header>

    <div class="hero">
        <h1>Music Without Chains</h1>
        <p>Direct support for independent artists. No labels. No algorithms. No bullshit.</p>
    </div>

    <div class="section">
        <h2 style="text-align:center; font-size:2.5rem; margin-bottom:3rem;">Featured Artists</h2>
        <div class="cards">
            <div class="card">
                <img src="https://picsum.photos/400/300?random=2" alt="">
                <div class="card-content">
                    <h3>Artist One</h3>
                    <p>Alternative • 47 songs</p>
                    <button class="play-btn">▶</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
