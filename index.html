<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnchainedBeats - Music Without Chains</title>
    <style>
        body { margin:0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #111; color: #eee; }
        header { background: linear-gradient(135deg, #1a1a1a, #2a2a2a); padding: 2rem; text-align: center; }
        h1 { margin:0; font-size: 3rem; color: #ff4d4d; }
        .tagline { font-size: 1.3rem; color: #aaa; margin-top: 0.5rem; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .artist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        .artist-card { background: #1a1a1a; border-radius: 8px; overflow: hidden; transition: transform 0.3s; }
        .artist-card:hover { transform: translateY(-8px); }
        .artist-card img { width: 100%; height: 200px; object-fit: cover; }
        .info { padding: 1.2rem; }
        .info h3 { margin: 0 0 8px 0; color: #ff4d4d; }
        button { background: #ff4d4d; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #ff3333; }
    </style>
</head>
<body>
    <header>
        <h1>UnchainedBeats</h1>
        <p class="tagline">Real music. Real artists. Zero middlemen.</p>
    </header>

    <div class="container">
        <h2 style="text-align:center; margin-bottom:2rem;">Featured Artists</h2>
        <div class="artist-grid">
            <!-- Add your artist cards here later -->
        </div>
    </div>
</body>
</html>
